; PlatformIO config for FreeRTOS Robot Arm firmware.
; Build/flash:  pio run -t upload   (or: pio run -t upload && pio device monitor)
;
; Board: any generic ESP32 dev module (NodeMCU-32S, WROOM, DOIT, etc.)
; Framework: Arduino (FreeRTOS ships with the arduino-esp32 core).
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform          = espressif32@6.7.0
board             = esp32dev
framework         = arduino
monitor_speed     = 115200
upload_speed      = 921600

; Libraries (resolved from PlatformIO registry).
lib_deps =
    knolleary/PubSubClient @ ^2.8
    madhephaestus/ESP32Servo @ ^3.0.0

; Build flags: C++17, expose FreeRTOS headers cleanly, warn on common issues.
build_flags =
    -std=gnu++17
    -DARDUINO_ARCH_ESP32
    -Wall
    -Wextra
    -Wno-unused-parameter

; Partition: default 4MB with FAT/OTA is fine for this size.
board_build.partitions = default.csv
