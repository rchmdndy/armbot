services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: robot-mqtt-broker
    restart: always
    ports:
      - "1883:1883"  # Standard MQTT for ESP32
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data:/mosquitto/data
      - ./log:/mosquitto/log

  web:
    image: nginx:alpine
    container_name: robot-mqtt-web
    restart: always
    ports:
      - "8082:80"    # Web interface on port 8082 (isolated from WS stack on 8081)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./web:/usr/share/nginx/html
    depends_on:
      - mosquitto
